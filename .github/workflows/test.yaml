name: ⬇️ Download from CurseForge (Playwright fixed)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of download URLs'
        required: true
        type: string
      wait_seconds:
        description: 'Seconds to wait (≥5 for CurseForge countdown)'
        required: false
        default: 8
        type: number

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Download files using Playwright
        run: |
          import os, sys, time, re
          from urllib.parse import urljoin
          from playwright.sync_api import sync_playwright

          urls = """${{ github.event.inputs.urls }}""".strip().split()
          wait = int("""${{ github.event.inputs.wait_seconds }}""")
          out_dir = "downloads"
          os.makedirs(out_dir, exist_ok=True)

          base_url = "https://www.curseforge.com"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(accept_downloads=True)
              page = context.new_page()

              for url in urls:
                  if not url.startswith("http"):
                      full_url = urljoin(base_url, url)
                  else:
                      full_url = url

                  print(f"\n→ Opening: {full_url}")
                  page.goto(full_url, wait_until="domcontentloaded")

                  # شمارش معکوس و شروع خودکار دانلود
                  try:
                      with page.expect_download(timeout=30000) as download_info:
                          print(f"Waiting {wait} seconds for countdown...")
                          time.sleep(wait)
                      download = download_info.value

                      fname = download.suggested_filename
                      if not fname:
                          fname = os.path.basename(full_url.rstrip('/')) or "downloaded_file"

                      filepath = os.path.join(out_dir, fname)
                      download.save_as(filepath)
                      print(f"✅ Saved: {filepath}")
                  except Exception as e:
                      print(f"❌ Failed to download {full_url}: {e}")
                      continue

              browser.close()
        shell: python

      - name: Commit and push files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          if git diff --cached --exit-code; then
            echo "No changes to commit."
          else
            git commit -m "Update downloaded files"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
            echo "Pushed successfully."
          fi
