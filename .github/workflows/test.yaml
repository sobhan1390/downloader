name: ⬇️ Download from CurseForge (Playwright)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of download URLs (e.g., /download/7914876)'
        required: true
        type: string
      wait_seconds:
        description: 'Seconds to wait before download (default 5)'
        required: false
        default: 5
        type: number

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Download files using Playwright
        run: |
          import os, sys, time
          from urllib.parse import urlparse, unquote, urljoin
          from playwright.sync_api import sync_playwright

          urls = """${{ github.event.inputs.urls }}""".strip().split()
          wait = int("""${{ github.event.inputs.wait_seconds }}""")
          out_dir = "downloads"
          os.makedirs(out_dir, exist_ok=True)

          base_url = "https://www.curseforge.com"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(accept_downloads=True)
              page = context.new_page()

              for url in urls:
                  # اگر مسیر نسبی بود کاملش کن
                  if not url.startswith("http"):
                      full_url = urljoin(base_url, url)
                  else:
                      full_url = url

                  print(f"\n→ Opening: {full_url}")
                  page.goto(full_url, wait_until="domcontentloaded")

                  # صبر می‌کنیم تا شمارش‌معکوس احتمالی تموم بشه
                  print(f"Waiting {wait} seconds for the countdown...")
                  time.sleep(wait)

                  # حالا شروع به انتظار برای دانلود می‌کنیم
                  try:
                      with page.expect_download(timeout=15000) as download_info:
                          # اگر صفحه دکمه‌ای داره روش کلیک کن؛ وگرنه ما فرض می‌کنیم
                          # که بعد از اتمام شمارش‌معکوس خودش دانلود می‌شه.
                          # می‌تونیم یه کلیک روی لینک "Download" یا "Click here" بزنیم.
                          # اینجا یه تلاش می‌کنیم روی دکمه‌ی اصلی دانلود کلیک کنیم:
                          page.click("a.btn-download, a:has-text('Download'), a[href*='download']")
                      download = download_info.value

                      # استخراج نام فایل از Content-Disposition
                      cd = download.headers.get('content-disposition', '')
                      import re
                      fname = None
                      if cd:
                          fname_match = re.findall('filename="?(.+)"?', cd)
                          if fname_match:
                              fname = fname_match[0]
                      if not fname:
                          fname = os.path.basename(unquote(urlparse(full_url).path))
                          if not fname:
                              fname = "downloaded_file"

                      filepath = os.path.join(out_dir, fname)
                      download.save_as(filepath)
                      print(f"✅ Saved: {filepath}")
                  except Exception as e:
                      print(f"❌ Failed to trigger download for {full_url}: {e}")
                      continue

              browser.close()
        shell: python

      - name: Commit and push files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          if git diff --cached --exit-code; then
            echo "No changes to commit."
          else
            git commit -m "Update downloaded files via Playwright"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
            echo "Pushed successfully."
          fi
