name: Download and Commit Polish Translation

on:
  workflow_dispatch:        # اجرای دستی
  schedule:                # اجرای خودکار مثلاً هفته‌ای یک‌بار
    - cron: '0 0 * * 0'   # هر یکشنبه ساعت ۰۰:۰۰ UTC

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure downloads directory exists
        run: mkdir -p downloads

      - name: Download file from CurseForge
        working-directory: downloads
        run: |
          curl -L -O -J \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            -H "Referer: https://www.curseforge.com/stardewvalley/mods/spolszczenie-polskie-tlumaczenie-stardew-valley" \
            "https://www.curseforge.com/stardewvalley/mods/spolszczenie-polskie-tlumaczenie-stardew-valley/download/7914876"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --cached --exit-code; then
            echo "No changes to commit."
          else
            git commit -m "Update Polish translation"
            git push
            echo "File committed and pushed."
          fi
